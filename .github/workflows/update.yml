name: Update Daily Average
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calcola data di ieri
        id: date
        run: |
          echo "YESTERDAY=$(date -u -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_ENV
          echo "YEAR=$(date -u -d 'yesterday' +%Y)" >> $GITHUB_ENV

      - name: Crea cartella anno e scarica CSV
        run: |
          mkdir -p ${YEAR}
          curl -o ${YEAR}/data-esp8266-2960722-${YESTERDAY}.csv \
            https://api-rrd.madavi.de/data_csv/csv-files/${YESTERDAY}/data-esp8266-2960722-${YESTERDAY}.csv

      - name: Calcola media
        run: |
          node <<EOF
          const fs = require('fs');
          const year = process.env.YEAR;
          const yesterday = process.env.YESTERDAY;

          const csv = fs.readFileSync(\`\${year}/data-esp8266-2960722-\${yesterday}.csv\`, 'utf8').trim().split('\n');
          const headers = csv[0].split(';');
          const p1Index = headers.indexOf('SDS_P1');
          const p2Index = headers.indexOf('SDS_P2');
          let sumP1 = 0, sumP2 = 0, count = 0;
          for (let i = 1; i < csv.length; i++) {
              const cols = csv[i].split(';');
              const p1 = parseFloat(cols[p1Index]);
              const p2 = parseFloat(cols[p2Index]);
              if (!isNaN(p1) && !isNaN(p2)) {
                  sumP1 += p1;
                  sumP2 += p2;
                  count++;
              }
          }
          const avgP1 = count ? sumP1 / count : 0;
          const avgP2 = count ? sumP2 / count : 0;

          const result = { date: yesterday, samples: count, avgP1: avgP1, avgP2: avgP2 };
          fs.writeFileSync('data.json', JSON.stringify(result, null, 2));

          const meanFile = \`\${year}/medie_giornaliere.csv\`;
          const newRow = \`\${yesterday},\${avgP1.toFixed(2)},\${avgP2.toFixed(2)},\${count}\`;
          if (!fs.existsSync(meanFile)) {
              fs.writeFileSync(meanFile, 'date,avg_SDS_P1,avg_SDS_P2,samples\n' + newRow + '\n');
          } else {
              fs.appendFileSync(meanFile, newRow + '\n');
          }
          EOF

      - name: Commit e Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ${YEAR}/data-esp8266-2960722-${YESTERDAY}.csv data.json medie_giornaliere.csv
          git commit -m "Update daily average ${YESTERDAY}" || echo "Nessuna modifica"
          git push